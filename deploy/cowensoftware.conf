# Cowen Leadership Consulting — static marketing site.
# Fully independent of mydishdynasty: its own server block, its own web root.
# Install location on the VPS: /etc/nginx/conf.d/cowensoftware.conf
#
# IMPORTANT: do NOT add `default_server` here — /etc/nginx/conf.d/mydishdynasty.conf
# already owns the `default_server` catch-all. Nginx routes to THIS block only
# when the Host header matches one of the server_name domains below; anything
# unmatched still falls through to mydishdynasty. The two never collide.
#
# Cloudflare sits in front (Flexible SSL): browser<->Cloudflare is HTTPS,
# Cloudflare<->origin is HTTP on :80, same as mydishdynasty. Every domain in
# server_name MUST be onboarded to Cloudflare (proxied A/AAAA -> this origin)
# or it will be HTTP-only / unreachable — see the DNS runbook.

server {
  listen 80;
  listen [::]:80;

  # All Cowen-brand domains serve the same site. cowenleadership.com is the
  # intended primary brand; the others are brand-protection / alias domains.
  server_name
    cowensoftware.com             www.cowensoftware.com
    cowenleadership.com           www.cowenleadership.com
    cowenleadershipconsulting.com www.cowenleadershipconsulting.com
    consultcowen.com              www.consultcowen.com
    cowenconsult.com              www.cowenconsult.com
    dtechleadership.com           www.dtechleadership.com;

  root  /var/www/cowensoftware;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Keep HTML revalidating so a deploy shows up quickly; let Cloudflare's CDN
  # handle edge caching of fonts/assets.
  location = /index.html {
    add_header Cache-Control "public, max-age=300";
  }

  access_log /var/log/nginx/cowensoftware.access.log;
  error_log  /var/log/nginx/cowensoftware.error.log;
}

# ---------------------------------------------------------------------------
# OPTIONAL — make cowenleadership.com the canonical domain (better for SEO).
# When you're ready to commit to one primary brand, REMOVE the alias domains
# from the server_name above, uncomment this block, and re-deploy. It
# 301-redirects every alias to https://cowenleadership.com, preserving the path.
