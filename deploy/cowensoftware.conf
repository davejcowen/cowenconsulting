# DTech Leadership — static marketing site.
# Fully independent of mydishdynasty: its own server block, its own web root.
# Install location on the VPS: /etc/nginx/conf.d/cowensoftware.conf
#
# IMPORTANT: do NOT add `default_server` here — /etc/nginx/conf.d/mydishdynasty.conf
# already owns the `default_server` catch-all. Nginx routes to THIS block only
# when the Host header matches one of the server_name domains below; anything
# unmatched still falls through to mydishdynasty. The two never collide.
#
# Cloudflare sits in front (Flexible SSL): browser<->Cloudflare is HTTPS,
# Cloudflare<->origin is HTTP on :80. Origin IP is 216.250.127.150. Every domain
# below MUST be a proxied A record -> that origin in Cloudflare.

# --- Canonical site: dtechleadership.com (apex) serves the content ----------
server {
  listen 80;
  listen [::]:80;
  server_name dtechleadership.com;

  root  /var/www/cowensoftware;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Keep HTML revalidating so a deploy shows up quickly; let Cloudflare's CDN
  # handle edge caching of fonts/assets.
  location = /index.html {
    add_header Cache-Control "public, max-age=300";
  }

  access_log /var/log/nginx/cowensoftware.access.log;
  error_log  /var/log/nginx/cowensoftware.error.log;
}

# --- Everything else 301-redirects to the canonical apex --------------------
# www.dtechleadership.com plus the retired cowensoftware.com (+ its www).
server {
  listen 80;
  listen [::]:80;
  server_name
    www.dtechleadership.com
    cowensoftware.com
    www.cowensoftware.com;

  return 301 https://dtechleadership.com$request_uri;
}
